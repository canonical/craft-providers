name: Update Copilot Instructions
on:
  schedule:
    - cron: "0 9 * * 1" # Run every Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-update:
    # Tracks @main to get the latest logic, while the content version is controlled by .github/.copilot-collections.yaml
    uses: canonical/copilot-collections/.github/workflows/auto_update_collections.yaml@main
    secrets: inherit
